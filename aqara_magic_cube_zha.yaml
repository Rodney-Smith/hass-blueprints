blueprint:
  name: (ZHA) Aqara Magic Cube
  description: Control anything using the Aqara Magic Cube setup with ZHA. v1.0
  domain: automation
  author: Rodney Smith
  source_url: https://gist.github.com/Rodney-Smith/64143af68c156b3370c83e692cb4b001

  input:
    cube_device:
      name: Magic Cube
      description: Select the Aqara Magic Cube device (ZHA)
      selector:
        device:
          integration: zha
          manufacturer: LUMI
          model: lumi.sensor_cube
          multiple: false

    cube_slide:
      name: Slide cube on any side
      default: []
      selector:
        action: {}

    cube_tap:
      name: Knock / Tap cube
      default: []
      selector:
        action: {}

    cube_flip90:
      name: Flip cube 90 degrees
      default: []
      selector:
        action: {}

    cube_flip180:
      name: Flip cube 180 degrees
      default: []
      selector:
        action: {}

    rotate_right:
      name: Rotate right
      default: []
      selector:
        action: {}

    rotate_left:
      name: Rotate left
      default: []
      selector:
        action: {}

    cube_wake:
      name: Wake up the cube
      default: []
      selector:
        action: {}

    cube_fall:
      name: Cube drops
      default: []
      selector:
        action: {}

    cube_shake:
      name: Shake cube
      default: []
      selector:
        action: {}

mode: queued
max: 5
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input cube_device
    id: cube_event

variables:
  command: "{{ trigger.event.data.command }}"

action:
  - choose:
      - conditions: "{{ command == 'slide' }}"
        sequence: !input cube_slide

      - conditions: "{{ command in ['tap', 'knock'] }}"
        sequence: !input cube_tap

      - conditions: "{{ command == 'flip90' }}"
        sequence: !input cube_flip90

      - conditions: "{{ command == 'flip180' }}"
        sequence: !input cube_flip180

      - conditions: "{{ command == 'rotate_left' }}"
        sequence: !input rotate_left

      - conditions: "{{ command == 'rotate_right' }}"
        sequence: !input rotate_right

      - conditions: "{{ command == 'shake' }}"
        sequence: !input cube_shake

      - conditions: "{{ command == 'fall' }}"
        sequence: !input cube_fall

      - conditions: "{{ command == 'wakeup' }}"
        sequence: !input cube_wake
